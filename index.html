<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ GeoSquad | My Global Crew ⚡</title>
    
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css' rel='stylesheet' />
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Impact', 'Arial Black', sans-serif; background: #0d0d13; overflow: hidden; display: flex; }
        #map { position: absolute; top: 0; bottom: 0; right: 0; left: 340px; }

        /* --- Arcade Sidebar --- */
        .sidebar {
            width: 340px;
            height: 100vh;
            background: linear-gradient(180deg, #14141f 0%, #0b0b11 100%);
            color: white;
            padding: 25px;
            box-sizing: border-box;
            z-index: 10;
            border-right: 3px solid #ff007f;
            box-shadow: 10px 0 30px rgba(255, 0, 127, 0.2);
            overflow-y: auto;
        }

        .sidebar h1 { 
            font-size: 2.2rem; 
            margin-top: 0; 
            text-align: center;
            color: #00ffff; 
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            letter-spacing: 1px;
        }

        .score-board { 
            background: #202030;
            border: 2px dashed #ff007f;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            font-size: 1.3rem; 
            margin-bottom: 25px; 
            color: #fff;
        }
        #friend-count { color: #ff007f; font-size: 1.8rem; display: block; }
        
        .crew-title { color: #ffff00; font-size: 1.2rem; margin-bottom: 10px; text-transform: uppercase; }
        
        .friend-list-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 12px;
            font-family: sans-serif;
            font-size: 0.9rem;
            border-left: 5px solid #00ffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease;
        }

        /* --- Pop-up Creation Card --- */
        .creation-card {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 280px;
            padding: 25px;
            background: rgba(15, 15, 25, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid #00ffff;
            border-radius: 28px;
            color: white;
            display: none;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
            z-index: 10;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .creation-card h2 { margin: 0 0 15px 0; font-size: 1.5rem; text-align: center; color: #ffff00; }
        .location-tag { font-family: sans-serif; opacity: 0.8; font-size: 0.85rem; text-align: center; margin-bottom: 15px; }
        
        /* Form Inputs */
        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 2px solid #333;
            background: #222;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
        }
        input:focus, select:focus { border-color: #ff007f; outline: none; }

        .btn-spawn {
            width: 100%;
            background: linear-gradient(45deg, #ff007f, #ff0055);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-family: 'Impact', sans-serif;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4);
            transition: transform 0.1s, box-shadow 0.2s;
        }
        .btn-spawn:hover { transform: scale(1.03); box-shadow: 0 6px 20px rgba(255, 0, 127, 0.6); }
        .btn-spawn:active { transform: scale(0.98); }

        /* Custom Emoji Markers styling */
        .custom-marker {
            font-size: 2.5rem;
            cursor: pointer;
            transition: transform 0.2s;
            filter: drop-shadow(0 0 8px rgba(0,255,255,0.6));
        }
        .custom-marker:hover { transform: scale(1.3) rotate(10deg); }

        /* --- Keyframes --- */
        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>🌍 GEOSQUAD</h1>
        <div class="score-board">
            GLOBAL CREW SIZE
            <span id="friend-count">0</span>
        </div>
        
        <div class="crew-title">👾 My Squad Log:</div>
        <div id="friend-log">
            </div>
    </div>

    <div id="map"></div>

    <div id="creation-overlay" class="creation-card">
        <h2>SQUAD SPOTTED!</h2>
        <div id="loc-display" class="location-tag">📍 Mapping Coordinates...</div>
        
        <input type="text" id="friend-name" placeholder="Friend's Name..." autocomplete="off">
        
        <select id="friend-emoji">
            <option value="😎">😎 Cool Guy/Gal</option>
            <option value="🐱">🐱 Cat Lover</option>
            <option value="👾">👾 Gamer</option>
            <option value="🍕">🍕 Pizza Fiend</option>
            <option value="🎨">🎨 Artist</option>
            <option value="🔥">🔥 Hype Friend</option>
        </select>

        <button id="spawn-button" class="btn-spawn">DROP TO MAP 🚀</button>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Network Directory</title>
    
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css' rel='stylesheet' />
    
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0b0c10; overflow: hidden; display: flex; }
        #map { position: absolute; top: 0; bottom: 0; right: 0; left: 360px; }

        /* --- Minimalist Sidebar --- */
        .sidebar {
            width: 360px;
            height: 100vh;
            background: #1f2833;
            color: #c5a059;
            padding: 30px 20px;
            box-sizing: border-box;
            z-index: 10;
            border-right: 1px solid #45a29e;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar h1 { 
            font-size: 1.4rem; 
            font-weight: 600;
            margin-top: 0; 
            margin-bottom: 25px;
            color: #66fcf1; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* --- Search Engine --- */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .search-box input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #45a29e;
            background: #0b0c10;
            color: #fff;
            font-size: 0.9rem;
        }
        .search-box button {
            background: #45a29e;
            color: #0b0c10;
            border: none;
            padding: 0 15px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .search-box button:hover { background: #66fcf1; }

        .directory-title { 
            color: #45a29e; 
            font-size: 0.85rem; 
            margin-bottom: 15px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            font-weight: 700;
        }
        
        .profile-item {
            background: #0b0c10;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 0.9rem;
            border-left: 3px solid #66fcf1;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .profile-item strong { color: #fff; display: block; margin-bottom: 2px; }
        .profile-item span { color: #45a29e; font-size: 0.8rem; display: block; margin-bottom: 5px; }
        .profile-item p { margin: 0; color: #c5a059; font-size: 0.85rem; }

        /* --- Profile Creation Card --- */
        .creation-card {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 300px;
            padding: 25px;
            background: rgba(31, 40, 51, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #45a29e;
            border-radius: 12px;
            color: white;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .creation-card h2 { margin: 0 0 5px 0; font-size: 1.1rem; color: #66fcf1; font-weight: 600; text-transform: uppercase; }
        .location-tag { color: #45a29e; font-size: 0.8rem; margin-bottom: 20px; line-height: 1.3; }
        
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #45a29e;
            background: #0b0c10;
            color: white;
            box-sizing: border-box;
            font-size: 0.9rem;
            font-family: inherit;
        }
        textarea { resize: none; height: 60px; }

        .btn-save {
            width: 100%;
            background: #66fcf1;
            color: #0b0c10;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-save:hover { background: #45a29e; }

        /* Custom Dot Marker Style */
        .dot-marker {
            width: 12px;
            height: 12px;
            background-color: #66fcf1;
            border-radius: 50%;
            border: 2px solid #0b0c10;
            box-shadow: 0 0 8px #66fcf1;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .dot-marker:hover { transform: scale(1.4); background-color: #fff; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>Network Map</h1>
        
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search a city or country...">
            <button id="search-button">Go</button>
        </div>
        
        <div class="directory-title">Saved Connections</div>
        <div id="profile-log">
            </div>
    </div>

    <div id="map"></div>

    <div id="creation-overlay" class="creation-card">
        <h2>Add Connection</h2>
        <div id="loc-display" class="location-tag">Fetching address...</div>
        
        <input type="text" id="profile-name" placeholder="Full Name" autocomplete="off">
        <input type="text" id="profile-role" placeholder="Role / Relationship" autocomplete="off">
        <textarea id="profile-notes" placeholder="Notes or contact info..."></textarea>

        <button id="save-button" class="btn-save">Save Profile</button>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
